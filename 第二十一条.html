        <div class="article-body">
            <h2>【原文】</h2>
            <p>太阳病，下之后，脉促胸满者，桂枝去芍药汤主之。</p>
            <h2>【释义】</h2>
            <p>太阳病误下后，出现脉促（数而时一止，止无定数）、胸闷（胸满），为胸阳受损、表邪未解。去芍药是因为芍药酸收，不利胸阳恢复。</p>
            <h2>【方剂】</h2>
            <p>桂枝去芍药汤</p>

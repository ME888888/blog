            <h2>【原文】</h2>
            <p>服桂枝汤，大汗出，脉洪大者，与桂枝汤，如前法。若形似疟，一日再发者，汗出必解，宜桂枝二麻黄一汤。</p>
            <h2>【释义】</h2>
            <p>服桂枝汤后大汗出、脉洪大，若形似疟，一日再发者，为表郁较轻，宜用桂枝二麻黄一汤（小发其汗）。</p>
            <h2>【方剂】</h2>
            <p>桂枝二麻黄一汤</p>

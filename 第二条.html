            <h2>【原文】</h2>
            <p>太阳病，发热，汗出，恶风，脉缓者，名为中风。</p>
            <h2>【释义】</h2>
            <p>太阳病若见发热、汗出、恶风、脉缓者，称为太阳中风证。"中风"此处指外感风邪所致的表虚证，与现代医学的脑血管意外无关。其病机为风邪袭表，卫强营弱，营阴外泄，故见汗出；脉缓乃因汗出营弱所致。</p>

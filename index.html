                <div style="margin-top: 40px; animation: fadeInUp 1.1s ease-out;">
                    <a href="articles.html" onclick="document.getElementById('bgAudio').play(); document.getElementById('musicBtn').textContent='⏸'; document.getElementById('musicBtn').onclick=function(){var a=document.getElementById('bgAudio');if(a.paused){a.play();this.textContent='⏸';}else{a.pause();this.textContent='▶';}}; toggleMusic(); return true;" style="background: rgba(255,255,255,0.18); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; padding: 15px 40px; border-radius: 50px; font-size: 1.08em; border: 1.5px solid rgba(255,255,255,0.4); text-decoration: none; display: inline-block; letter-spacing: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: all 0.3s ease;">开始研读</a>

    <!-- 背景音乐 -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; animation: fadeIn 1.5s ease-out;">
        <div style="background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-radius: 50px; padding: 10px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 18px;">🎵</span>
            <audio id="bgAudio" loop style="height: 28px;">
                <source src="music/background_music.mp3" type="audio/mpeg">
            </audio>
            <button onclick="toggleMusic()" id="musicBtn" style="background: var(--primary-color); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;">▶</button>
        </div>
    </div>
    <script>
        var audio = document.getElementById('bgAudio');
        audio.volume = 0.35;
        var audio = document.getElementById('bgAudio');
        audio.volume = 0.35;
        function toggleMusic() {
            if (playing) {
                audio.pause();
                document.getElementById('musicBtn').textContent = '▶';
            } else {
                audio.play().catch(() => {});
                document.getElementById('musicBtn').textContent = '⏸';
            }
            playing = !playing;
        }
    </script>

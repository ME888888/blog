            <div class="article-meta">

            </div>
        </div>

        <div class="article-body">
            <h2>【原文】</h2>
            <p>病有发热恶寒者，发于阳也；无热恶寒者，发于阴也。发于阳，七日愈；发于阴，六日愈。以阳数七，阴数六故也。</p>
            <h2>【释义】</h2>
            <p>外感病分为阴阳两类：发热恶寒并存者，病在阳经（三阳），为阳证；只恶寒不发热者，病在阴经（三阴），为阴证。阳证七日可愈，阴证六日可愈。此为古代以数理推演疾病转归的理论。</p>

            <h2>【原文】</h2>
            <p>病人身大热，反欲得衣者，热在皮肤，寒在骨髓也；身大寒，反不欲近衣者，寒在皮肤，热在骨髓也。</p>
            <h2>【释义】</h2>
            <p>此条论真寒假热与真热假寒的鉴别：</p>
            <ul>
                <li>身大热却想穿衣保暖→内真寒外假热（阴盛格阳）</li>
                <li>身大寒却不想穿衣→内真热外假寒（阳盛格阴）</li>
            </ul>
            <h2>【临床意义】</h2>
            <p>强调四诊合参，透过现象看本质，不可仅凭单一症状下诊断。</p>

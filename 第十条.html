            <h2>【原文】</h2>
            <p>风家，表解而不了了者，十二日愈。</p>
            <h2>【释义】</h2>
            <p>经常患太阳中风的人，表证虽已解除，但身体尚有不适（不了了），需约十二日方能完全康复。素体虚弱者，邪气虽解，正气恢复较慢。</p>

        <div class="article-body">
            <h2>【原文】</h2>
            <p>太阳病，项背强几几，反汗出恶风者，桂枝加葛根汤主之。</p>
            <h2>【释义】</h2>
            <p>项背强几几（项背部僵硬不适）为太阳经气不舒所致。中风证兼有项背强急者，用桂枝加葛根汤治疗。</p>
            <h2>【方剂】</h2>
            <p>桂枝加葛根汤</p>
            <h2>【组成】</h2>
            <p>在桂枝汤基础上加葛根四两</p>
            <h2>【煎服法】</h2>
            <p>先煮葛根，后纳诸药（同桂枝汤法）</p>

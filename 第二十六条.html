            <h2>【原文】</h2>
            <p>服桂枝汤，大汗出后，大烦渴不解，脉洪大者，白虎加人参汤主之。</p>
            <h2>【释义】</h2>
            <p>服桂枝汤后大汗出，伤津助热，转属阳明气分热盛证。见大烦渴不解（热盛伤津）、脉洪大，当用白虎加人参汤清气分热、益气生津。</p>
            <h2>【方剂】</h2>
            <p>白虎加人参汤</p>

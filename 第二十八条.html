        <div class="article-body">
            <h2>【原文】</h2>
            <p>服桂枝汤，或下之，仍头项强痛，翕翕发热，无汗，心下满，微痛，小便不利者，桂枝去桂加茯苓白术汤主之。</p>
            <h2>【释义】</h2>
            <p>经汗下后仍见头项强痛、翕翕发热、无汗，为表邪未解；心下满、微痛、小便不利，为水饮内停，气化不利。去桂是因表邪不著，水饮为重。</p>
            <h2>【方剂】</h2>
            <p>桂枝去桂加茯苓白术汤</p>

            </div>

        <div class="article-body">
            <h2>【原文】</h2>
            <p>太阳病，头痛至七日以上自愈者，以行其经尽故也。若欲作再经者，针足阳明，使经不传则愈。</p>
            <h2>【释义】</h2>
            <p>太阳病头痛，若七日以上自行痊愈，是太阳经行尽，正胜邪退。若病情不愈，将欲传经，可针刺足阳明经穴位（如足三里），使邪气不再内传。</p>
